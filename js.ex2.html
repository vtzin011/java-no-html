<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execução JS - Ultra Fast</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff0000, #ff8000, #ffff00, #00ff00, #00ffff, #0000ff, #8000ff, #ff00ff);
            background-size: 1500% 1500%;
            animation: ultraFlow 3s linear infinite; 
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
        }

        @keyframes ultraFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 25px;
            max-width: 600px;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            background: linear-gradient(to right, #fff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .questao {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .btn-executar {
            background: #00ff80;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.2s;
            width: 100%;
        }

        .btn-executar:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #00ff80;
        }

        .output {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: #000;
            color: #00ff80;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            border: 1px solid #00ff80;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Painel de Execução</h1>

    <div class="questao">
        <p>1. Apresentação de Ana</p>
        <button class="btn-executar" onclick="executar(1)">Executar</button>
        <div id="out-1" class="output"></div>
    </div>

    <div class="questao">
        <p>2. Soma de 5 e 3</p>
        <button class="btn-executar" onclick="executar(2)">Executar</button>
        <div id="out-2" class="output"></div>
    </div>

    <div class="questao">
        <p>3. Par ou Ímpar (7)</p>
        <button class="btn-executar" onclick="executar(3)">Executar</button>
        <div id="out-3" class="output"></div>
    </div>

    <div class="questao">
        <p>4. Nota 6.5 - Status</p>
        <button class="btn-executar" onclick="executar(4)">Executar</button>
        <div id="out-4" class="output"></div>
    </div>

    <div class="questao">
        <p>5. Idade 17 - Categoria</p>
        <button class="btn-executar" onclick="executar(5)">Executar</button>
        <div id="out-5" class="output"></div>
    </div>

    <div class="questao">
        <p>6. Resultado subtrai(10, 4)</p>
        <button class="btn-executar" onclick="executar(6)">Executar</button>
        <div id="out-6" class="output"></div>
    </div>

    <div class="questao">
        <p>7. Média Final Maria</p>
        <button class="btn-executar" onclick="executar(7)">Executar</button>
        <div id="out-7" class="output"></div>
    </div>
</div>

<script>
    function executar(q) {
        const out = document.getElementById('out-' + q);
        out.style.display = "block";
        
        const respostas = {
            1: "Olá, meu nome é Ana e tenho 20 anos.",
            2: "A soma de 5 e 3 é 8.",
            3: "O número 7 é Ímpar.",
            4: "Aluno Aprovado.",
            5: "A pessoa é menor de idade.",
            6: "Resultado: 6",
            7: "A aluna Maria teve média 6 e está aprovada."
        };

        out.innerText = "> " + respostas[q];
    }
</script>

</body>
</html>
