<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunĂ§oes JaVascript 2</title>
</head>
<body>
   <script>
    
function situacaoAluno(nome,nota) {
            if (nota >= 7){
                return `${nome} foi Aprovado`
            }else if (nota >= 5 && nota < 6.9 ){
                return `${nome} esta de recuperaĂ§ĂŁo`
            }else if (nota < 5){
                return `${nome} esta reprovado`
            }else {
                return `Nota nĂŁo calculada`
            }
            }
            let cachorro = prompt("Digite seu nome \n")
            let caramelo = Number(prompt("Digite a sua nota, \n (de 0 a 10)\n"))
            alert(situacaoAluno(cachorro,caramelo))

            function verificarIdade(nome,idade){
                if (idade <= 12){
                    return `${nome} ĂŠ crianĂ§a`
                }else if (idade >= 13 && idade <= 17){
                    return `${nome} ĂŠ adolescente` 
                }else if (idade >= 18 && idade <= 59){
                    return `${nome} ĂŠ adulto(a)`
                }else if (idade >= 60){
                    return `${nome} ĂŠ velho(a)`
                }               
            }
            let puto = Number(prompt("Digite sua idade \n"))
            alert(verificarIdade(cachorro,puto))
            
            function calculadora(n1,n2,op){
                if (op == "+"){
                    return n1 + n2
                }else if (op == "-"){
                    return n1 - n2
                }else if (op == "*"){
                    return n1 * n2
                }else if (op == "/"){
                    return n1 / n2
                }else{
                    return `OperaĂ§ĂŁo nĂŁo encontrada`
                }
            }
            let porta = Number(prompt("Digite o primeiro nĂşmero \n"))
            let aviĂŁo = Number(prompt("Digite o outro nĂşmero \n"))
            let network = prompt("Digite a operaĂ§ĂŁo (+ - * /) \n")
            alert(calculadora(porta,aviĂŁo,network))

            function desconto(nome,valor){
                if (valor >= 500){
                    return `vocĂŞ teve 20$ de desconto, ${valor - (0.2 * valor)}`
                }else if (valor >= 200 ){
                    return `vocĂŞ teve 10$ de desconto, ${valor - (0.1 * valor)}`
                }else {
                    return `vocĂŞ nĂŁo teve desconto`
                }
            }
            let abdusido= Number(prompt("Digite o valor de sua compra \n"))
            alert(`O valor de sua compra era de ${abdusido}R$, entĂŁo ${desconto(cachorro,abdusido)}`)

            function parOuImpar(num){
                if (num % 2 == 0){
                    return `O ${num} ĂŠ par`
                }else{
                    return `O ${num} ĂŠ Ă­mpar` 
                }
            }
            let ET= Number(prompt("Digite um nĂşmero,\n veremos se ele ĂŠ par ou Ă­mpar \n"))
            alert(parOuImpar(ET))

            function login(usuario,senha){
                if (usuario == "admin" && senha == "1234"){
                    return `Acesso permitido`
                }else if (usuario == "admin" && senha != "1234"){
                    return `senha incorreta`
                }else{
                    return `Acesso negado`
                }
            }
            let toca= prompt("Digite o seu usuĂĄrio \n")
            let cagado = prompt("Digite sua senha \n")
            alert(login(toca,cagado))

            function temperatura(cidade,temp){
                if (temp <= 15){
                    return `${cidade} muito frio tche`
                }else if (temp > 15 && temp <= 25){
                    return `${cidade} morno piĂĄ`
                }else {
                    return `${cidade} esta pelando tche`
                }
            }
            let chupeta = prompt("Digite sua cidade \n")
            let nenem = Number(prompt("Digite a temperatura \n"))
            alert(temperatura(chupeta,nenem))


   </script>
